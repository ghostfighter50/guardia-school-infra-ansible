---
# Step 0 – Create the Ansible service account on a fresh machine.
# Connects as the initial admin user (password login + sudo escalation).
# Run once per new host before switching to key-based auth.
#
#   ansible-playbook playbooks/00_service_account.yml -k -K

- name: Provision Ansible service account
  hosts: linux_targets
  gather_facts: true
  vars:
    ansible_user: "{{ admin_user }}"
    ansible_become: true
    ansible_become_method: sudo
  roles:
    - service_account

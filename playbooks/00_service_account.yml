---
# Step 0 – Create the Ansible service account on a fresh machine.
# Connects as the initial admin user (password login via su to root).
# Run once per new host before switching to key-based auth.
#
#   ansible-playbook playbooks/00_service_account.yml -k

- name: Provision Ansible service account
  hosts: linux_targets
  gather_facts: true
  vars:
    ansible_user: "{{ admin_user }}"
    ansible_password: "{{ vault_bootstrap_password }}"
    ansible_become: true
    ansible_become_method: su
    ansible_become_user: root
    ansible_become_password: "{{ vault_bootstrap_password }}"
  roles:
    - service_account

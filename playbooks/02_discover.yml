---
# Network discovery: find Linux VM candidates on the subnet,
# then write a clean generated inventory to inventory/hosts.yml.
#
# Usage :
#   ansible-playbook \
#     -i inventory/hosts.yml \
#     -i inventory/nmap_discovery.yml \
#     playbooks/02_discover.yml
#
# This playbook does not apply hardening. It only updates inventory/hosts.yml
# and writes reports to inventory/discovery_report.yml and inventory/centreon_hosts.csv.

- name: Discover VMs and build inventory
  hosts: localhost
  become: false
  gather_facts: true
  vars:
    inventory_path: "{{ playbook_dir }}/../inventory/hosts.yml"
    discovery_report_path: "{{ playbook_dir }}/../inventory/discovery_report.yml"
    centreon_export_path: "{{ playbook_dir }}/../inventory/centreon_hosts.csv"
    scan_subnet: "10.1.91.100-200"

  tasks:
    - name: Read discovered nmap candidates
      ansible.builtin.set_fact:
        discovered_candidates: >-
          {{
            groups['candidate_linux_target'] | default([])
          }}

    - name: Build discovered host records
      ansible.builtin.set_fact:
        discovered_targets: >-
          {{
            (discovered_targets | default([]))
            + [
                {
                  'name': item,
                  'ip': (hostvars[item].ip | default(hostvars[item].ansible_host | default(item))),
                  'port': (
                    (
                      hostvars[item].ports | default([])
                      | selectattr('port', 'equalto', '2222')
                      | map(attribute='port')
                      | first
                    )
                    | default(
                        (
                          hostvars[item].ports | default([])
                          | selectattr('port', 'equalto', '22')
                          | map(attribute='port')
                          | first
                        ),
                        true
                      )
                    | default(22, true)
                  )
                }
              ]
          }}
      loop: "{{ discovered_candidates }}"

    - name: Deduplicate discovered IPs
      ansible.builtin.set_fact:
        discovered_ips: "{{ discovered_targets | default([]) | map(attribute='ip') | list | unique }}"

    - name: Build generated host map
      ansible.builtin.set_fact:
        generated_hosts: >-
          {{
            (generated_hosts | default({}))
            | combine({
                ('auto_' ~ (item.ip | regex_replace('[^0-9A-Za-z_]', '_'))): {
                  'ansible_host': item.ip,
                  'ansible_port': item.port
                }
              })
          }}
      loop: "{{ discovered_targets | default([]) }}"
      loop_control:
        label: "{{ item.ip }}"

    - name: Write clean generated inventory
      ansible.builtin.copy:
        dest: "{{ inventory_path }}"
        content: |
          ---
          # Generated by playbooks/02_discover.yml
          # Do not edit host entries manually.
          all:
            hosts:
              localhost:
                ansible_connection: local
            children:
              linux_targets:
                hosts:
          {{ (generated_hosts | default({})) | to_nice_yaml(indent=2) | indent(10, true) }}
        mode: '0644'

    - name: Show discovered hosts
      ansible.builtin.debug:
        msg: "Discovered Linux hosts: {{ discovered_ips | join(', ') if discovered_ips else '(none)' }}"

    - name: Build discovery report
      ansible.builtin.set_fact:
        report:
          scan_date: "{{ ansible_date_time.iso8601 | default(lookup('pipe', 'date -Iseconds')) }}"
          subnet: "{{ scan_subnet }}"
          total_scanned: "{{ groups['discovered_ssh'] | default([]) | length }}"
          discovered_hosts: "{{ discovered_ips | default([]) }}"
          inventory_file_updated: "{{ inventory_path }}"
          web_hosts: "{{ groups['discovered_web'] | default([]) }}"
          snmp_hosts: "{{ groups['discovered_snmp'] | default([]) }}"

    - name: Add per-host port details to report
      ansible.builtin.set_fact:
        report: "{{ report | combine({'details': (report.details | default({})) | combine({ item: (hostvars[item].ports | default([])) }) }, recursive=True) }}"
      loop: "{{ discovered_candidates | default([]) }}"

    - name: Write YAML report
      ansible.builtin.copy:
        dest: "{{ discovery_report_path }}"
        content: "{{ report | to_nice_yaml(indent=2) }}"
        mode: '0644'

    - name: Write Centreon import CSV
      ansible.builtin.copy:
        dest: "{{ centreon_export_path }}"
        content: |
          host_name;alias;ip_address;host_template;snmp_version;snmp_community;poller
          {% for item in (generated_hosts | default({}) | dict2items) %}
          {{ item.key }};{{ item.key }};{{ item.value.ansible_host }};{{ centreon_host_template | default('OS-Linux-SNMP-custom') }};2c;{{ snmp_community | default('public_ro') }};{{ centreon_poller_name | default('poller-01') }}
          {% endfor %}
        mode: '0644'

    - name: Show report path
      ansible.builtin.debug:
        msg: "Detailed report: {{ discovery_report_path }}"

    - name: Show updated inventory path
      ansible.builtin.debug:
        msg: "Updated inventory: {{ inventory_path }}"

    - name: Show Centreon import path
      ansible.builtin.debug:
        msg: "Centreon import CSV: {{ centreon_export_path }}"


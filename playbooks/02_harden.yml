---
# Step 2 – Harden Linux targets.
# Applies: base packages, SSH hardening + PAM TOTP, firewall, SNMP, managed user.
# Requires Vault to be running and unsealed (run 01_vault.yml first).
#
#   ansible-playbook playbooks/02_harden.yml

- name: Harden Linux targets
  hosts: linux_targets
  become: true
  gather_facts: true
  roles:
    - role: common
      tags: [common]
    - role: ssh_hardening
      tags: [ssh]
    - role: ufw_firewall
      tags: [firewall]
    - role: snmp_agent
      tags: [snmp]
    - role: managed_user
      tags: [users]

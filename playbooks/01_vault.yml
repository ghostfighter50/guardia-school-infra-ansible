---
# Step 1 – Deploy HashiCorp Vault on the Ansible controller (localhost).
# Run with sudo on the controller:
#
#   ansible-playbook playbooks/01_vault.yml -K

- name: Deploy HashiCorp Vault on controller
  hosts: localhost
  connection: local
  become: true
  gather_facts: true
  roles:
    - role: vault_server
      tags: [vault]

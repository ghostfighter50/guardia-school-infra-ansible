---
# Dynamic inventory via community.general.nmap
# Usage:
#   ansible-inventory -i inventory/nmap_discovery.yml --graph
#
# Scans the subnet and groups hosts based on open ports.

plugin: community.general.nmap
address: 10.1.91.0/24
exclude:
  - 10.1.91.1      # gateway/firewall
  - 10.1.91.110    # Centreon poller
strict: false
ports: true
ipv4: true
ipv6: false
# ARP ping helps detect VMs that block ICMP.
# Requires sudo to send raw ARP packets.
use_arp_ping: true
sudo: true

# Automatic groups by detected open ports.
# A host with SSH open is considered a linux_targets candidate.
groups:
  discovered_ssh: "ports is defined and ports | selectattr('port', 'in', ['22','2222']) | list | length > 0"
  discovered_web: "ports is defined and ports | selectattr('port', 'in', ['80','443']) | list | length > 0"
  discovered_snmp: "ports is defined and ports | selectattr('port', 'equalto', '161') | list | length > 0"

# Convenience alias: all SSH hosts are Linux candidates.
# These hosts are consumed by playbooks/02_discover.yml.
keyed_groups:
  - key: "'candidate_linux_target'"
    parent_group: discovered_ssh
    prefix: ""
    separator: ""


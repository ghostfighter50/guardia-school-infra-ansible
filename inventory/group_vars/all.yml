---
# Users

# Service account used by Ansible (SSH key only, exempt from 2FA)
ansible_service_user: admin-isr
ansible_service_user_home: /home/admin-isr/ansible_projet

# Human admin account (password + 2FA TOTP)
admin_user: admin-isr

# SSH hardening
ssh_port: 2222
ssh_permit_root_login: "no"
ssh_max_auth_tries: 3
ssh_login_grace_time: 30
ssh_client_alive_interval: 300
ssh_client_alive_count_max: 2

# SNMP monitoring
snmp_community: "public_ro"
snmp_location: "Lab"
snmp_contact: "admin@example.local"
snmp_allowed_source: "10.1.91.110"

# HashiCorp Vault
vault_addr: "{{ lookup('env', 'VAULT_ADDR') | default('http://127.0.0.1:8200', true) }}"

# Secrets resolved at runtime via Vault KV v2
vault_bootstrap_password: >-
  {{ lookup('community.hashi_vault.vault_kv2_get',
            'infra/bootstrap',
            engine_mount_point='secret',
            url=vault_addr).secret.password }}

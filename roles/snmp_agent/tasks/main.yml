---
- name: Install SNMP agent and tools
  ansible.builtin.apt:
    name:
      - snmpd
      - snmp
    state: present

- name: Deploy snmpd configuration
  ansible.builtin.template:
    src: snmpd.conf.j2
    dest: /etc/snmp/snmpd.conf
    owner: root
    group: Debian-snmp
    mode: '0640'
    backup: true
  notify: restart snmpd

- name: Enable and start snmpd
  ansible.builtin.service:
    name: snmpd
    state: started
    enabled: true

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Verify snmpd responds
  ansible.builtin.command: >
    snmpget -v2c -c {{ snmp_community }} -t 3 -r 1 127.0.0.1 .1.3.6.1.2.1.1.1.0
  register: snmp_check
  changed_when: false
  retries: 3
  delay: 2
  until: snmp_check.rc == 0
